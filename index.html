<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitFlow — Build Your Future</title>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HabitFlow">
<meta name="theme-color" content="#7c5cfc">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf4fc;
    --text: #f0f0f8;
    --muted: #6b6b80;
    --success: #5cfca0;
    --gold: #fcd05c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,92,252,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(252,92,125,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 30% 30% at 60% 10%, rgba(92,244,252,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Noise overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 420px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 16px;
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(252,208,92,0.1);
    border: 1px solid rgba(252,208,92,0.2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--gold);
  }

  .streak-badge .fire { font-size: 1rem; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

  /* ── HERO ── */
  .hero {
    padding: 28px 16px 20px;
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .greeting {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent3);
    margin-bottom: 8px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-sub {
    font-size: 0.9rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.5;
  }

  /* ── XP BAR ── */
  .xp-section {
    margin: 20px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  .xp-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .level-tag {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .xp-text { font-size: 0.78rem; color: var(--muted); }
  .xp-text strong { color: var(--text); }

  .xp-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .xp-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 1.2s cubic-bezier(0.23,1,0.32,1);
    position: relative;
  }

  .xp-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 8px var(--accent2);
  }

  /* ── AI INSIGHT CARD ── */
  .ai-card {
    margin: 0 16px 16px;
    background: linear-gradient(135deg, rgba(124,92,252,0.12), rgba(252,92,125,0.08));
    border: 1px solid rgba(124,92,252,0.25);
    border-radius: 18px;
    padding: 18px;
    position: relative;
    z-index: 1;
    overflow: hidden;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .ai-card:hover { transform: translateY(-2px); border-color: rgba(124,92,252,0.45); }

  .ai-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,92,252,0.2), transparent 70%);
  }

  .ai-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .ai-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .ai-text {
    font-size: 0.92rem;
    line-height: 1.55;
    color: var(--text);
    font-weight: 300;
    min-height: 44px;
  }

  .ai-text .highlight { color: var(--accent3); font-weight: 500; }

  .ai-refresh {
    margin-top: 12px;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* ── HABITS SECTION ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 16px 12px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    position: relative;
    z-index: 1;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .add-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .add-btn:hover { background: var(--accent); border-color: var(--accent); }

  /* ── HABIT CARDS ── */
  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 0 16px;
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  .habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.23,1,0.32,1);
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s cubic-bezier(0.23,1,0.32,1) both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .habit-card:hover { transform: translateX(4px); border-color: rgba(255,255,255,0.12); }

  .habit-card.done {
    background: rgba(92,252,160,0.04);
    border-color: rgba(92,252,160,0.15);
  }

  .habit-card.done .habit-name { text-decoration: line-through; color: var(--muted); }

  /* Completion shimmer */
  .habit-card.done::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(92,252,160,0.04), transparent);
    animation: shimmer 2s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }

  .habit-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .habit-info { flex: 1; min-width: 0; }

  .habit-name {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.3s;
  }

  .habit-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .habit-streak {
    font-size: 0.73rem;
    color: var(--gold);
    font-weight: 500;
  }

  .habit-time {
    font-size: 0.73rem;
    color: var(--muted);
  }

  .dots-row {
    display: flex;
    gap: 4px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--surface2);
    transition: background 0.3s;
  }
  .dot.filled { background: var(--accent); }
  .dot.filled.today { background: var(--success); box-shadow: 0 0 6px var(--success); }

  .check-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
    font-size: 0;
    color: var(--success);
  }

  .check-btn:hover { border-color: var(--success); background: rgba(92,252,160,0.08); }

  .habit-card.done .check-btn {
    background: rgba(92,252,160,0.15);
    border-color: var(--success);
    font-size: 1rem;
  }

  /* ── ADD HABIT MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px 24px 0 0;
    padding: 28px 20px 40px;
    width: 100%;
    max-width: 420px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px;
    border-radius: 99px;
    background: var(--border);
    margin: 0 auto 24px;
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }

  .emoji-btn {
    height: 46px;
    border-radius: 10px;
    background: var(--surface2);
    border: 2px solid transparent;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .emoji-btn:hover, .emoji-btn.selected {
    background: rgba(124,92,252,0.15);
    border-color: var(--accent);
    transform: scale(1.05);
  }

  .input-group {
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-group input, .input-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus, .input-group select:focus { border-color: var(--accent); }
  .input-group input::placeholder { color: var(--muted); }
  .input-group select option { background: var(--surface2); }

  .create-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .create-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,92,252,0.35); }
  .create-btn:active { transform: translateY(0); }

  /* ── BOTTOM STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 16px 16px 0;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    position: relative;
    z-index: 1;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    max-width: 420px;
    margin: 0 auto;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 24px;
    z-index: 10;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 6px 0;
    transition: all 0.2s;
    opacity: 0.4;
  }

  .nav-item.active { opacity: 1; }
  .nav-item.active .nav-icon { color: var(--accent); }

  .nav-icon { font-size: 1.3rem; }

  .nav-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--success);
    color: #0a0a0f;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.88rem;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* spacer for bottom nav */
  .spacer { height: 90px; }

  /* stagger animations */
  .habit-card:nth-child(1) { animation-delay: 0.05s; }
  .habit-card:nth-child(2) { animation-delay: 0.1s; }
  .habit-card:nth-child(3) { animation-delay: 0.15s; }
  .habit-card:nth-child(4) { animation-delay: 0.2s; }
  .habit-card:nth-child(5) { animation-delay: 0.25s; }

  /* ── AI LOADING ── */
  .ai-thinking {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }
  .ai-thinking span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .ai-thinking span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .ai-thinking span:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast">✨ Habit completed! +20 XP</div>

<!-- Nav -->
<nav>
  <div class="logo">HabitFlow</div>
  <div class="streak-badge"><span class="fire">🔥</span> <span id="streakNum">7</span> day streak</div>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="greeting">Good morning</div>
  <h1>Build the life<br><span>you deserve</span></h1>
  <p class="hero-sub">4 habits · <span id="doneCount">0</span> done today</p>
</div>

<!-- XP Bar -->
<div class="xp-section" style="margin:0 16px 16px; max-width:388px;">
  <div class="xp-header">
    <div class="level-tag">⚡ Level 12</div>
    <div class="xp-text"><strong id="xpCurrent">340</strong> / 500 XP</div>
  </div>
  <div class="xp-track"><div class="xp-fill" id="xpBar"></div></div>
</div>

<!-- AI Insight -->
<div class="ai-card" id="aiCard" onclick="refreshInsight()">
  <div class="ai-label"><div class="ai-dot"></div> AI Coach</div>
  <div class="ai-text" id="aiText">
    <div class="ai-thinking"><span></span><span></span><span></span></div>
  </div>
  <div class="ai-refresh">↻ Tap for new insight</div>
</div>

<!-- Habits -->
<div class="section-header">
  <div class="section-title">Today's habits</div>
  <button class="add-btn" onclick="openModal()">+</button>
</div>

<div class="habits-list" id="habitsList"></div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-num" id="statStreak">7</div>
    <div class="stat-label">Day streak</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statTotal">42</div>
    <div class="stat-label">Completions</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statRate">84%</div>
    <div class="stat-label">Success rate</div>
  </div>
</div>

<div class="spacer"></div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Today</div>
  </div>
  <div class="nav-item">
    <div class="nav-icon">📊</div>
    <div class="nav-label">Progress</div>
  </div>
  <div class="nav-item">
    <div class="nav-icon">🤖</div>
    <div class="nav-label">AI Coach</div>
  </div>
  <div class="nav-item">
    <div class="nav-icon">👤</div>
    <div class="nav-label">Profile</div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>New Habit ✨</h2>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="input-group">
      <label>Habit name</label>
      <input type="text" id="habitNameInput" placeholder="e.g. Meditate for 10 minutes">
    </div>
    <div class="input-group">
      <label>Best time</label>
      <select id="habitTime">
        <option value="Morning">🌅 Morning</option>
        <option value="Afternoon">☀️ Afternoon</option>
        <option value="Evening">🌙 Evening</option>
        <option value="Anytime">⏰ Anytime</option>
      </select>
    </div>
    <button class="create-btn" onclick="addHabit()">Create Habit</button>
  </div>
</div>

<script>
const EMOJIS = ['🧘','🏃','💪','📚','💧','🥗','😴','🎯','🧠','✍️','🎨','🎸','🌿','🧹','💊','☕','🚴','🏊','🙏','💻'];
const COLORS = [
  'rgba(124,92,252,0.15)','rgba(252,92,125,0.15)','rgba(92,244,252,0.15)',
  'rgba(252,208,92,0.15)','rgba(92,252,160,0.15)','rgba(252,160,92,0.15)'
];

const INSIGHTS = [
  "You're <span class='highlight'>most consistent on Tuesdays</span>. Try scheduling harder habits then — your data shows 91% completion on that day.",
  "Your streak shows real momentum. Research suggests <span class='highlight'>21 days</span> to form a habit — you're already at 7. Keep going.",
  "You complete morning habits <span class='highlight'>2.3× more often</span> than evening ones. Consider shifting evening habits earlier.",
  "Small wins compound. Completing just <span class='highlight'>3 habits daily</span> for a year equals 1,095 positive actions. That's transformation.",
  "Your best week had <span class='highlight'>94% completion rate</span>. You've done it before — you can do it again today.",
  "Studies show habit stacking works. Try pairing your next new habit with <span class='highlight'>morning coffee</span> for faster adoption.",
];

let habits = [
  { id:1, icon:'🧘', name:'Meditate', time:'Morning', streak:5, done:false, days:[1,1,1,0,1,1,0] },
  { id:2, icon:'💧', name:'Drink 2L water', time:'Anytime', streak:12, done:false, days:[1,1,1,1,1,1,0] },
  { id:3, icon:'📚', name:'Read 20 pages', time:'Evening', streak:3, done:false, days:[0,1,1,0,1,0,0] },
  { id:4, icon:'🏃', name:'Morning run', time:'Morning', streak:7, done:false, days:[1,1,1,1,1,1,0] },
];

let selectedEmoji = '🧘';
let xp = 340;
let insightIdx = 0;

// Render habits
function render() {
  const list = document.getElementById('habitsList');
  list.innerHTML = '';
  const done = habits.filter(h => h.done).length;
  document.getElementById('doneCount').textContent = done;

  habits.forEach((h, i) => {
    const card = document.createElement('div');
    card.className = 'habit-card' + (h.done ? ' done' : '');
    card.style.animationDelay = (i * 0.06) + 's';
    card.innerHTML = `
      <div class="habit-icon" style="background:${COLORS[i % COLORS.length]}">${h.icon}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-meta">
          <span class="habit-streak">🔥 ${h.streak}d</span>
          <span class="habit-time">${h.time}</span>
        </div>
        <div class="dots-row">
          ${h.days.map((d,di) => `<div class="dot ${d?'filled':''}${di===6&&d?' today':''}"></div>`).join('')}
        </div>
      </div>
      <button class="check-btn" onclick="toggleHabit(${h.id},event)">${h.done ? '✓' : ''}</button>
    `;
    list.appendChild(card);
  });
}

function toggleHabit(id, e) {
  e.stopPropagation();
  const h = habits.find(x => x.id === id);
  if (!h.done) {
    h.done = true;
    h.streak++;
    h.days[6] = 1;
    gainXP(20);
    showToast('✨ ' + h.name + ' done! +20 XP');
  } else {
    h.done = false;
    h.streak = Math.max(0, h.streak - 1);
    h.days[6] = 0;
    xp = Math.max(0, xp - 20);
    updateXP();
  }
  render();
  updateStats();
}

function gainXP(amount) {
  xp += amount;
  if (xp >= 500) { xp = xp - 500; alert('🎉 Level Up! You reached Level 13!'); }
  updateXP();
}

function updateXP() {
  document.getElementById('xpCurrent').textContent = xp;
  document.getElementById('xpBar').style.width = (xp / 500 * 100) + '%';
}

function updateStats() {
  const done = habits.filter(h => h.done).length;
  document.getElementById('statTotal').textContent = 42 + done;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// AI Insight
function loadInsight() {
  const el = document.getElementById('aiText');
  el.innerHTML = '<div class="ai-thinking"><span></span><span></span><span></span></div>';
  setTimeout(() => {
    el.innerHTML = INSIGHTS[insightIdx % INSIGHTS.length];
    insightIdx++;
  }, 1200);
}

function refreshInsight() { loadInsight(); }

// Modal
function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function addHabit() {
  const name = document.getElementById('habitNameInput').value.trim();
  if (!name) { document.getElementById('habitNameInput').focus(); return; }
  const time = document.getElementById('habitTime').value;
  habits.push({ id: Date.now(), icon: selectedEmoji, name, time, streak: 0, done: false, days: [0,0,0,0,0,0,0] });
  document.getElementById('habitNameInput').value = '';
  document.getElementById('modalOverlay').classList.remove('open');
  render();
  showToast('🎯 New habit added!');
}

// Emoji grid
function buildEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => {
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedEmoji = e;
    };
    grid.appendChild(btn);
  });
}

// Init
buildEmojiGrid();
render();
updateXP();
loadInsight();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
